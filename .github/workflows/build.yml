  # ==========================================
  # CREATE GITHUB RELEASE
  # ==========================================
  release:
    name: 🚀 Create Release
    needs: [build-linux, build-windows, build-macos-arm, build-macos-intel]
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 📋 List All Artifacts
        run: |
          echo "📦 Downloaded artifacts:"
          find artifacts -type f -ls

      - name: 📁 Prepare Release Files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-files/ \;
          echo "📦 Release files:"
          ls -la release-files/

      - name: 🔖 Get Version
        id: version
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: 📝 Generate Release Notes
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cat > changelog.md << EOF
          ## 🚀 Orion GUI ${VERSION}

          ### ✨ Features
          - 💬 Full chat GUI with streaming responses
          - 📦 Model Manager (check/update/delete models)
          - 🏪 Model Store (download any Ollama model)
          - ⚙️ Ollama auto-installer
          - 🔄 Real-time update checking
          - 📊 Download progress tracking
          - 📱 Mobile responsive design

          ### 📥 Downloads

          | Platform | Architecture | File |
          |----------|-------------|------|
          | 🐧 Linux | x86_64 | \`OrionGUI-Linux-${VERSION}.tar.gz\` |
          | 🪟 Windows | x86_64 | \`OrionGUI-Windows-${VERSION}.zip\` |
          | 🍎 macOS | Apple Silicon (M1/M2/M3) | \`OrionGUI-macOS-ARM-${VERSION}.tar.gz\` |
          | 🍎 macOS | Intel (x86_64) | \`OrionGUI-macOS-Intel-${VERSION}.tar.gz\` |

          ### 🚀 Quick Start

          **Linux / macOS:**
          \`\`\`bash
          tar -xzf OrionGUI-*.tar.gz
          cd OrionGUI-*/
          chmod +x OrionGUI-*
          ./OrionGUI-*
          \`\`\`

          **Windows:**
          \`\`\`
          1. Extract ZIP
          2. Double-click OrionGUI-Windows.exe
          3. Open http://localhost:5000
