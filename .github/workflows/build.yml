name: Build Orion GUI

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.1.0)'
        required: true
        default: '1.1.0'
      pre_release:
        description: 'Pre-release?'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: 'OrionGUI'

jobs:
  # ==========================================
  # BUILD FOR LINUX
  # ==========================================
  build-linux:
    name: 🐧 Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 📝 Create config.yml if missing
        run: |
          if [ ! -f config.yml ]; then
            cat > config.yml << 'EOF'
          app:
            name: "Orion GUI"
            version: "${{ github.event.inputs.version || github.ref_name }}"
            author: "OmniNode"
            port: 5000
            debug: false

          ollama:
            url: "http://localhost:11434"
            default_model: "OmniNode/Orion:V1.1"
            auto_check_updates: true

          models:
            available:
              - name: "OmniNode/Orion:V1.1"
                version: "1.1"
                description: "Latest stable release"
                size: "4.1 GB"
                latest: true
              - name: "OmniNode/Orion:V1.0"
                version: "1.0"
                description: "Initial release"
                size: "4.1 GB"
                latest: false
            recommended:
              - name: "mistral:7b"
                description: "Base Mistral 7B"
                size: "4.1 GB"
              - name: "llama3:8b"
                description: "Meta LLaMA 3 8B"
                size: "4.7 GB"
              - name: "codellama:7b"
                description: "Code LLaMA 7B"
                size: "3.8 GB"
              - name: "phi3:mini"
                description: "Microsoft Phi-3 Mini"
                size: "2.3 GB"

          ollama_install:
            linux:
              command: "curl -fsSL https://ollama.com/install.sh | sh"
            windows:
              url: "https://ollama.com/download/OllamaSetup.exe"
            macos:
              brew: "brew install ollama"
              url: "https://ollama.com/download/Ollama-darwin.zip"
          EOF
            echo "✅ config.yml created"
          else
            echo "✅ config.yml already exists"
          fi

      - name: 📝 Create install_ollama.py if missing
        run: |
          if [ ! -f install_ollama.py ]; then
            cat > install_ollama.py << 'PYEOF'
          #!/usr/bin/env python3
          import platform, subprocess, sys, os, urllib.request, time

          class OllamaInstaller:
              def __init__(self):
                  self.system = platform.system().lower()

              def is_installed(self):
                  try:
                      result = subprocess.run(["ollama", "--version"], capture_output=True, text=True, timeout=10)
                      return result.returncode == 0
                  except:
                      return False

              def install(self):
                  print(f"Installing Ollama for {self.system}...")
                  if self.system == "linux":
                      subprocess.run(["bash", "-c", "curl -fsSL https://ollama.com/install.sh | sh"])
                  elif self.system == "darwin":
                      subprocess.run(["brew", "install", "ollama"])
                  elif self.system == "windows":
                      url = "https://ollama.com/download/OllamaSetup.exe"
                      path = os.path.join(os.environ.get("TEMP", "."), "OllamaSetup.exe")
                      urllib.request.urlretrieve(url, path)
                      subprocess.Popen([path], shell=True)
                      print(f"Installer downloaded: {path}")

              def start(self):
                  try:
                      subprocess.Popen(["ollama", "serve"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                      time.sleep(3)
                      print("Ollama server started")
                  except Exception as e:
                      print(f"Error: {e}")

          if __name__ == "__main__":
              installer = OllamaInstaller()
              if not installer.is_installed():
                  installer.install()
              installer.start()
          PYEOF
            echo "✅ install_ollama.py created"
          else
            echo "✅ install_ollama.py already exists"
          fi

      - name: 📋 Verify Files Exist
        run: |
          echo "📁 Files in workspace:"
          ls -la
          echo ""
          echo "📁 Templates:"
          ls -la templates/ || echo "⚠️ No templates folder"
          echo ""
          echo "📁 Static:"
          ls -la static/ || echo "⚠️ No static folder"
          echo ""
          echo "✅ config.yml exists: $(test -f config.yml && echo YES || echo NO)"
          echo "✅ install_ollama.py exists: $(test -f install_ollama.py && echo YES || echo NO)"
          echo "✅ app.py exists: $(test -f app.py && echo YES || echo NO)"

      - name: 🔨 Build Linux Executable
        run: |
          pyinstaller \
            --onefile \
            --name ${{ env.APP_NAME }}-Linux \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "config.yml:." \
            --add-data "install_ollama.py:." \
            --hidden-import flask \
            --hidden-import requests \
            --hidden-import yaml \
            --hidden-import jinja2 \
            --hidden-import markupsafe \
            --hidden-import click \
            --hidden-import blinker \
            --hidden-import itsdangerous \
            --hidden-import werkzeug \
            --clean \
            --noconfirm \
            app.py

      - name: 📁 Create Release Package
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          mkdir -p release/OrionGUI-Linux
          cp dist/${{ env.APP_NAME }}-Linux release/OrionGUI-Linux/
          cp install_ollama.py release/OrionGUI-Linux/
          cp config.yml release/OrionGUI-Linux/
          cp README.md release/OrionGUI-Linux/ || true
          chmod +x release/OrionGUI-Linux/${{ env.APP_NAME }}-Linux
          cd release
          tar -czf ../OrionGUI-Linux-${VERSION}.tar.gz OrionGUI-Linux/

      - name: 📤 Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-Linux
          path: OrionGUI-Linux-*.tar.gz
          retention-days: 30

  # ==========================================
  # BUILD FOR WINDOWS
  # ==========================================
  build-windows:
    name: 🪟 Build Windows
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 📝 Create config.yml if missing
        shell: pwsh
        run: |
          if (-not (Test-Path "config.yml")) {
            @"
          app:
            name: "Orion GUI"
            version: "${{ github.event.inputs.version || github.ref_name }}"
            author: "OmniNode"
            port: 5000
            debug: false

          ollama:
            url: "http://localhost:11434"
            default_model: "OmniNode/Orion:V1.1"
            auto_check_updates: true

          models:
            available:
              - name: "OmniNode/Orion:V1.1"
                version: "1.1"
                description: "Latest stable release"
                size: "4.1 GB"
                latest: true
              - name: "OmniNode/Orion:V1.0"
                version: "1.0"
                description: "Initial release"
                size: "4.1 GB"
                latest: false
            recommended:
              - name: "mistral:7b"
                description: "Base Mistral 7B"
                size: "4.1 GB"
              - name: "llama3:8b"
                description: "Meta LLaMA 3 8B"
                size: "4.7 GB"

          ollama_install:
            windows:
              url: "https://ollama.com/download/OllamaSetup.exe"
          "@ | Out-File -FilePath "config.yml" -Encoding utf8
            Write-Host "✅ config.yml created"
          } else {
            Write-Host "✅ config.yml already exists"
          }

      - name: 📝 Create install_ollama.py if missing
        shell: pwsh
        run: |
          if (-not (Test-Path "install_ollama.py")) {
            @"
          #!/usr/bin/env python3
          import platform, subprocess, sys, os, urllib.request, time

          class OllamaInstaller:
              def __init__(self):
                  self.system = platform.system().lower()

              def is_installed(self):
                  try:
                      result = subprocess.run(["ollama", "--version"], capture_output=True, text=True, timeout=10)
                      return result.returncode == 0
                  except:
                      return False

              def install(self):
                  if self.system == "windows":
                      url = "https://ollama.com/download/OllamaSetup.exe"
                      path = os.path.join(os.environ.get("TEMP", "."), "OllamaSetup.exe")
                      urllib.request.urlretrieve(url, path)
                      subprocess.Popen([path], shell=True)

              def start(self):
                  try:
                      subprocess.Popen(["ollama", "serve"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                      time.sleep(3)
                  except Exception as e:
                      print(f"Error: {e}")

          if __name__ == "__main__":
              installer = OllamaInstaller()
              if not installer.is_installed():
                  installer.install()
              installer.start()
          "@ | Out-File -FilePath "install_ollama.py" -Encoding utf8
            Write-Host "✅ install_ollama.py created"
          } else {
            Write-Host "✅ install_ollama.py already exists"
          }

      - name: 📋 Verify Files Exist
        shell: pwsh
        run: |
          Write-Host "📁 Files:"
          Get-ChildItem -Name
          Write-Host ""
          Write-Host "config.yml exists: $(Test-Path 'config.yml')"
          Write-Host "install_ollama.py exists: $(Test-Path 'install_ollama.py')"
          Write-Host "app.py exists: $(Test-Path 'app.py')"

      - name: 🔨 Build Windows Executable
        run: |
          pyinstaller `
            --onefile `
            --name ${{ env.APP_NAME }}-Windows `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "config.yml;." `
            --add-data "install_ollama.py;." `
            --hidden-import flask `
            --hidden-import requests `
            --hidden-import yaml `
            --hidden-import jinja2 `
            --hidden-import markupsafe `
            --hidden-import click `
            --hidden-import blinker `
            --hidden-import itsdangerous `
            --hidden-import werkzeug `
            --clean `
            --noconfirm `
            --console `
            app.py

      - name: 📁 Create Release Package
        shell: pwsh
        run: |
          $VERSION = "${{ github.event.inputs.version || github.ref_name }}"
          New-Item -ItemType Directory -Force -Path "release\OrionGUI-Windows"
          Copy-Item "dist\${{ env.APP_NAME }}-Windows.exe" "release\OrionGUI-Windows\"
          Copy-Item "install_ollama.py" "release\OrionGUI-Windows\"
          Copy-Item "config.yml" "release\OrionGUI-Windows\"
          if (Test-Path "README.md") { Copy-Item "README.md" "release\OrionGUI-Windows\" }
          Compress-Archive -Path "release\OrionGUI-Windows\*" -DestinationPath "OrionGUI-Windows-${VERSION}.zip"

      - name: 📤 Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-Windows
          path: OrionGUI-Windows-*.zip
          retention-days: 30

