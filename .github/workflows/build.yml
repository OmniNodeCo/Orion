name: Build Orion GUI

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.1.0)'
        required: true
        default: '1.1.0'
      pre_release:
        description: 'Pre-release?'
        required: false
        default: 'false'
        type: boolean

  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: 'OrionGUI'
  OLLAMA_MODEL: 'OmniNode/Orion'

jobs:
  # ==========================================
  # CHECK FOR UPDATES
  # ==========================================
  check-updates:
    name: 🔍 Check for Updates
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      latest_version: ${{ steps.check.outputs.latest_version }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Dependencies
        run: pip install requests pyyaml

      - name: 🔍 Check Versions
        id: check
        run: |
          python << 'PYEOF'
          import requests, yaml, os, json

          GITHUB_OUTPUT = os.environ.get("GITHUB_OUTPUT", "")
          REPO = os.environ.get("GITHUB_REPOSITORY", "")
          EVENT_NAME = os.environ.get("GITHUB_EVENT_NAME", "")
          INPUT_VERSION = "${{ github.event.inputs.version }}"
          REF_NAME = "${{ github.ref_name }}"

          def write_output(key, value):
              with open(GITHUB_OUTPUT, "a") as f:
                  f.write(f"{key}={value}\n")

          # Check Ollama
          print("🔍 Checking Ollama...")
          try:
              r = requests.get("https://api.github.com/repos/ollama/ollama/releases/latest", timeout=15)
              if r.status_code == 200:
                  print(f"  Latest Ollama: {r.json().get('tag_name', '')}")
          except: pass

          # Check GitHub releases
          print("🔍 Checking GitHub releases...")
          github_latest = ""
          try:
              r = requests.get(f"https://api.github.com/repos/{REPO}/releases/latest", timeout=15)
              if r.status_code == 200:
                  github_latest = r.json().get("tag_name", "")
                  print(f"  Latest release: {github_latest}")
          except: pass

          # Check config
          config_version = ""
          try:
              if os.path.exists("config.yml"):
                  with open("config.yml") as f:
                      config_version = yaml.safe_load(f).get("app", {}).get("version", "")
                  print(f"  Config version: {config_version}")
          except: pass

          # Decision
          should_build = False
          latest_version = INPUT_VERSION or REF_NAME or config_version or "1.1.0"

          if EVENT_NAME in ["workflow_dispatch", "push"]:
              should_build = True
          elif EVENT_NAME == "schedule":
              if github_latest != f"v{config_version}" and config_version:
                  should_build = True

          print(f"\n📌 Should build: {should_build}")
          print(f"📌 Version: {latest_version}")

          write_output("should_build", str(should_build).lower())
          write_output("latest_version", latest_version)
          PYEOF

  # ==========================================
  # GENERATE CONFIG
  # ==========================================
  generate-config:
    name: 📝 Generate Config
    needs: [check-updates]
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install
        run: pip install requests pyyaml

      - name: 📝 Generate Config Files
        run: |
          VERSION=${{ needs.check-updates.outputs.latest_version }}
          python << PYEOF
          import yaml

          config = {
              "app": {
                  "name": "Orion GUI",
                  "version": "${VERSION}",
                  "author": "OmniNode",
                  "port": 5000,
                  "debug": False
              },
              "ollama": {
                  "url": "http://localhost:11434",
                  "default_model": "OmniNode/Orion:V1.1",
                  "auto_check_updates": True
              },
              "models": {
                  "available": [
                      {"name": "OmniNode/Orion:V1.1", "version": "1.1", "description": "Latest stable", "size": "4.1 GB", "latest": True},
                      {"name": "OmniNode/Orion:V1.0", "version": "1.0", "description": "Initial release", "size": "4.1 GB", "latest": False}
                  ],
                  "recommended": [
                      {"name": "mistral:7b", "description": "Mistral 7B", "size": "4.1 GB"},
                      {"name": "llama3:8b", "description": "LLaMA 3 8B", "size": "4.7 GB"},
                      {"name": "codellama:7b", "description": "Code LLaMA 7B", "size": "3.8 GB"},
                      {"name": "phi3:mini", "description": "Phi-3 Mini", "size": "2.3 GB"},
                      {"name": "gemma2:2b", "description": "Gemma 2 2B", "size": "1.6 GB"}
                  ]
              },
              "ollama_install": {
                  "linux": {"command": "curl -fsSL https://ollama.com/install.sh | sh"},
                  "windows": {"url": "https://ollama.com/download/OllamaSetup.exe"},
                  "macos": {"brew": "brew install ollama"}
              }
          }

          with open("config.yml", "w") as f:
              yaml.dump(config, f, default_flow_style=False, sort_keys=False)

          print("✅ config.yml generated")
          PYEOF

      - name: 📝 Generate install_ollama.py
        run: |
          cat > install_ollama.py << 'PYEOF'
          #!/usr/bin/env python3
          import platform, subprocess, sys, os, time
          try:
              import urllib.request
          except: pass

          class OllamaInstaller:
              def __init__(self):
                  self.system = platform.system().lower()
              def is_installed(self):
                  try:
                      r = subprocess.run(["ollama","--version"], capture_output=True, text=True, timeout=10)
                      return r.returncode == 0
                  except: return False
              def is_running(self):
                  try:
                      import requests
                      return requests.get("http://localhost:11434/api/tags", timeout=5).status_code == 200
                  except: return False
              def install(self):
                  print(f"Installing Ollama for {self.system}...")
                  try:
                      if self.system == "linux":
                          subprocess.run(["bash","-c","curl -fsSL https://ollama.com/install.sh | sh"])
                      elif self.system == "darwin":
                          subprocess.run(["brew","install","ollama"])
                      elif self.system == "windows":
                          url = "https://ollama.com/download/OllamaSetup.exe"
                          p = os.path.join(os.environ.get("TEMP","."),"OllamaSetup.exe")
                          urllib.request.urlretrieve(url, p)
                          subprocess.Popen([p], shell=True)
                  except Exception as e: print(f"Error: {e}")
              def start(self):
                  if self.is_running(): return
                  try:
                      subprocess.Popen(["ollama","serve"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL, start_new_session=True)
                      time.sleep(5)
                  except: pass

          if __name__ == "__main__":
              i = OllamaInstaller()
              if not i.is_installed(): i.install()
              i.start()
              i.is_running() and print("✅ Ollama running")
          PYEOF

      - name: 📝 Generate Windows Installer Script (Inno Setup)
        run: |
          VERSION=${{ needs.check-updates.outputs.latest_version }}
          cat > installer.iss << EOF
          [Setup]
          AppName=Orion GUI
          AppVersion=${VERSION}
          AppPublisher=OmniNode
          AppPublisherURL=https://github.com/OmniNode/Orion
          AppSupportURL=https://github.com/OmniNode/Orion/issues
          DefaultDirName={autopf}\OrionGUI
          DefaultGroupName=Orion GUI
          AllowNoIcons=yes
          OutputDir=output
          OutputBaseFilename=OrionGUI-Windows-Setup-${VERSION}
          Compression=lzma2/ultra64
          SolidCompression=yes
          WizardStyle=modern
          SetupIconFile=orion.ico
          UninstallDisplayIcon={app}\OrionGUI-Windows.exe
          PrivilegesRequired=lowest
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked
          Name: "startmenu"; Description: "Create Start Menu shortcut"; GroupDescription: "{cm:AdditionalIcons}"
          Name: "installollama"; Description: "Install Ollama (required)"; GroupDescription: "Dependencies"; Flags: unchecked

          [Files]
          Source: "dist\OrionGUI-Windows.exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "install_ollama.py"; DestDir: "{app}"; Flags: ignoreversion
          Source: "config.yml"; DestDir: "{app}"; Flags: ignoreversion
          Source: "README.md"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\Orion GUI"; Filename: "{app}\OrionGUI-Windows.exe"
          Name: "{group}\Uninstall Orion GUI"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\Orion GUI"; Filename: "{app}\OrionGUI-Windows.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\OrionGUI-Windows.exe"; Description: "Launch Orion GUI"; Flags: nowait postinstall skipifsilent

          [Code]
          function InitializeSetup(): Boolean;
          begin
            Result := True;
          end;

          procedure CurStepChanged(CurStep: TSetupStep);
          begin
            if CurStep = ssPostInstall then
            begin
              if WizardIsTaskSelected('installollama') then
              begin
                Exec('powershell.exe', '-Command "Invoke-WebRequest -Uri https://ollama.com/download/OllamaSetup.exe -OutFile $env:TEMP\OllamaSetup.exe; Start-Process $env:TEMP\OllamaSetup.exe"', '', SW_SHOW, ewWaitUntilTerminated, ResultCode);
              end;
            end;
          end;
          EOF

      - name: 📝 Generate AppImage Desktop Entry
        run: |
          mkdir -p appimage-build

          cat > appimage-build/OrionGUI.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Orion GUI
          Comment=GUI for Orion AI on Ollama
          Exec=OrionGUI-Linux
          Icon=orion
          Categories=Utility;Development;Science;
          Terminal=false
          StartupNotify=true
          Keywords=ai;ollama;orion;chat;llm;
          EOF

          cat > appimage-build/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/OrionGUI-Linux" "$@"
          APPRUN
          chmod +x appimage-build/AppRun

      - name: 🎨 Generate Icon
        run: |
          # Create a simple SVG icon
          cat > appimage-build/orion.svg << 'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
            <rect width="256" height="256" rx="48" fill="#0a0a0f"/>
            <circle cx="128" cy="128" r="60" fill="none" stroke="#6c63ff" stroke-width="8"/>
            <circle cx="128" cy="128" r="20" fill="#6c63ff"/>
            <circle cx="128" cy="128" r="90" fill="none" stroke="#6c63ff" stroke-width="3" opacity="0.3"/>
          </svg>
          SVG

          # Convert to PNG for AppImage
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick > /dev/null 2>&1
          convert appimage-build/orion.svg -resize 256x256 appimage-build/orion.png
          convert appimage-build/orion.svg -resize 256x256 orion.png

          # Create .ico for Windows
          convert appimage-build/orion.svg -resize 256x256 \
            \( -clone 0 -resize 16x16 \) \
            \( -clone 0 -resize 32x32 \) \
            \( -clone 0 -resize 48x48 \) \
            \( -clone 0 -resize 64x64 \) \
            \( -clone 0 -resize 128x128 \) \
            \( -clone 0 -resize 256x256 \) \
            -delete 0 orion.ico

      - name: 📤 Upload Generated Files
        uses: actions/upload-artifact@v4
        with:
          name: generated-files
          path: |
            config.yml
            install_ollama.py
            installer.iss
            orion.ico
            orion.png
            appimage-build/
          retention-days: 1

  # ==========================================
  # BUILD LINUX + APPIMAGE
  # ==========================================
  build-linux:
    name: 🐧 Build Linux + AppImage
    needs: [check-updates, generate-config]
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Generated Files
        uses: actions/download-artifact@v4
        with:
          name: generated-files
          path: .

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 📋 Verify Files
        run: |
          for f in app.py config.yml install_ollama.py; do
            echo "$f: $(test -f $f && echo '✅' || echo '❌')"
          done
          for d in templates static; do
            echo "$d/: $(test -d $d && echo '✅' || echo '❌')"
          done

      - name: 🔨 Build Linux Binary
        run: |
          pyinstaller \
            --onefile \
            --name ${{ env.APP_NAME }}-Linux \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "config.yml:." \
            --add-data "install_ollama.py:." \
            --hidden-import flask \
            --hidden-import requests \
            --hidden-import yaml \
            --hidden-import jinja2 \
            --hidden-import markupsafe \
            --hidden-import click \
            --hidden-import blinker \
            --hidden-import itsdangerous \
            --hidden-import werkzeug \
            --clean \
            --noconfirm \
            app.py

      - name: 📁 Create Portable Package
        run: |
          VERSION=${{ needs.check-updates.outputs.latest_version }}
          mkdir -p release/OrionGUI-Linux
          cp dist/${{ env.APP_NAME }}-Linux release/OrionGUI-Linux/
          cp install_ollama.py release/OrionGUI-Linux/
          cp config.yml release/OrionGUI-Linux/
          cp README.md release/OrionGUI-Linux/ || true
          chmod +x release/OrionGUI-Linux/${{ env.APP_NAME }}-Linux
          cd release
          tar -czf ../OrionGUI-Linux-${VERSION}.tar.gz OrionGUI-Linux/

      - name: 📦 Build AppImage
        run: |
          VERSION=${{ needs.check-updates.outputs.latest_version }}

          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/metainfo

          # Copy binary
          cp dist/${{ env.APP_NAME }}-Linux AppDir/usr/bin/
          chmod +x AppDir/usr/bin/${{ env.APP_NAME }}-Linux

          # Copy config files
          cp config.yml AppDir/usr/bin/
          cp install_ollama.py AppDir/usr/bin/

          # Copy AppRun
          cp appimage-build/AppRun AppDir/
          chmod +x AppDir/AppRun

          # Copy desktop entry
          cp appimage-build/OrionGUI.desktop AppDir/
          cp appimage-build/OrionGUI.desktop AppDir/usr/share/applications/

          # Copy icon
          cp appimage-build/orion.png AppDir/orion.png
          cp appimage-build/orion.png AppDir/usr/share/icons/hicolor/256x256/apps/orion.png
          cp appimage-build/orion.png AppDir/.DirIcon

          # Create AppStream metadata
          cat > AppDir/usr/share/metainfo/com.omninode.oriongui.appdata.xml << METAEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>com.omninode.oriongui</id>
            <name>Orion GUI</name>
            <summary>GUI for Orion AI on Ollama</summary>
            <metadata_license>MIT</metadata_license>
            <project_license>MIT</project_license>
            <description>
              <p>Orion GUI is a modern chat interface for the Orion AI model running on Ollama.</p>
              <p>Features include model management, update checking, and a beautiful dark UI.</p>
            </description>
            <url type="homepage">https://github.com/OmniNode/Orion</url>
            <releases>
              <release version="${VERSION}" date="$(date +%Y-%m-%d)"/>
            </releases>
          </component>
          METAEOF

          # Build AppImage
          ARCH=x86_64 ./appimagetool --no-appstream AppDir OrionGUI-Linux-${VERSION}.AppImage

          chmod +x OrionGUI-Linux-${VERSION}.AppImage
          echo "✅ AppImage built successfully"
          ls -la OrionGUI-Linux-${VERSION}.AppImage

      - name: 📤 Upload Linux Portable
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-Linux-Portable
          path: OrionGUI-Linux-*.tar.gz
          retention-days: 30

      - name: 📤 Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-Linux-AppImage
          path: OrionGUI-Linux-*.AppImage
          retention-days: 30

  # ==========================================
  # BUILD WINDOWS + SETUP INSTALLER
  # ==========================================
  build-windows:
    name: 🪟 Build Windows + Setup
    needs: [check-updates, generate-config]
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Generated Files
        uses: actions/download-artifact@v4
        with:
          name: generated-files
          path: .

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 📋 Verify Files
        shell: pwsh
        run: |
          foreach ($f in @("app.py","config.yml","install_ollama.py","installer.iss","orion.ico")) {
            Write-Host "$f : $(if(Test-Path $f){'✅'}else{'❌'})"
          }

      - name: 🔨 Build Windows Executable
        run: |
          pyinstaller `
            --onefile `
            --name ${{ env.APP_NAME }}-Windows `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "config.yml;." `
            --add-data "install_ollama.py;." `
            --icon "orion.ico" `
            --hidden-import flask `
            --hidden-import requests `
            --hidden-import yaml `
            --hidden-import jinja2 `
            --hidden-import markupsafe `
            --hidden-import click `
            --hidden-import blinker `
            --hidden-import itsdangerous `
            --hidden-import werkzeug `
            --clean `
            --noconfirm `
            --console `
            app.py

      - name: 📁 Create Portable ZIP
        shell: pwsh
        run: |
          $VERSION = "${{ needs.check-updates.outputs.latest_version }}"
          New-Item -ItemType Directory -Force -Path "release\OrionGUI-Windows"
          Copy-Item "dist\${{ env.APP_NAME }}-Windows.exe" "release\OrionGUI-Windows\"
          Copy-Item "install_ollama.py" "release\OrionGUI-Windows\"
          Copy-Item "config.yml" "release\OrionGUI-Windows\"
          if (Test-Path "README.md") { Copy-Item "README.md" "release\OrionGUI-Windows\" }
          Compress-Archive -Path "release\OrionGUI-Windows\*" -DestinationPath "OrionGUI-Windows-Portable-${VERSION}.zip"

      - name: 📦 Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "✅ Inno Setup installed"

      - name: 📦 Build Windows Setup Installer
        shell: pwsh
        run: |
          $VERSION = "${{ needs.check-updates.outputs.latest_version }}"

          # Create output directory
          New-Item -ItemType Directory -Force -Path "output"

          # Verify files exist
          Write-Host "Checking required files..."
          $requiredFiles = @(
            "dist\${{ env.APP_NAME }}-Windows.exe",
            "install_ollama.py",
            "config.yml",
            "orion.ico"
          )
          foreach ($f in $requiredFiles) {
            if (Test-Path $f) {
              Write-Host "  ✅ $f"
            } else {
              Write-Host "  ❌ $f MISSING"
            }
          }

          # Fix installer.iss paths
          $issContent = @"
          [Setup]
          AppName=Orion GUI
          AppVersion=$VERSION
          AppPublisher=OmniNode
          AppPublisherURL=https://github.com/OmniNode/Orion
          AppSupportURL=https://github.com/OmniNode/Orion/issues
          DefaultDirName={autopf}\OrionGUI
          DefaultGroupName=Orion GUI
          AllowNoIcons=yes
          OutputDir=output
          OutputBaseFilename=OrionGUI-Windows-Setup-$VERSION
          Compression=lzma2/ultra64
          SolidCompression=yes
          WizardStyle=modern
          SetupIconFile=orion.ico
          UninstallDisplayIcon={app}\OrionGUI-Windows.exe
          PrivilegesRequired=lowest
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          LicenseFile=
          DisableWelcomePage=no
          DisableDirPage=no

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"
          Name: "startmenu"; Description: "Create Start Menu shortcut"; GroupDescription: "{cm:AdditionalIcons}"

          [Files]
          Source: "dist\OrionGUI-Windows.exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "install_ollama.py"; DestDir: "{app}"; Flags: ignoreversion
          Source: "config.yml"; DestDir: "{app}"; Flags: ignoreversion
          Source: "README.md"; DestDir: "{app}"; Flags: ignoreversion skipifsourcedoesntexist

          [Icons]
          Name: "{group}\Orion GUI"; Filename: "{app}\OrionGUI-Windows.exe"; IconFilename: "{app}\OrionGUI-Windows.exe"
          Name: "{group}\Uninstall Orion GUI"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\Orion GUI"; Filename: "{app}\OrionGUI-Windows.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\OrionGUI-Windows.exe"; Description: "Launch Orion GUI"; Flags: nowait postinstall skipifsilent shellexec

          [UninstallDelete]
          Type: filesandirs; Name: "{app}"
          "@

          $issContent | Out-File -FilePath "OrionSetup.iss" -Encoding ascii
          Write-Host "✅ Inno Setup script created"

          # Run Inno Setup compiler
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "OrionSetup.iss"

          if ($LASTEXITCODE -eq 0) {
            Write-Host "✅ Windows Setup installer built!"
            Get-ChildItem output
          } else {
            Write-Host "❌ Inno Setup build failed"
            exit 1
          }

      - name: 📤 Upload Windows Portable
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-Windows-Portable
          path: OrionGUI-Windows-Portable-*.zip
          retention-days: 30

      - name: 📤 Upload Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-Windows-Setup
          path: output/OrionGUI-Windows-Setup-*.exe
          retention-days: 30

  # ==========================================
  # BUILD MACOS (Apple Silicon)
  # ==========================================
  build-macos-arm:
    name: 🍎 Build macOS (Apple Silicon)
    needs: [check-updates, generate-config]
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: macos-14

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Generated Files
        uses: actions/download-artifact@v4
        with:
          name: generated-files
          path: .

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 📋 Verify Files
        run: |
          for f in app.py config.yml install_ollama.py; do
            echo "$f: $(test -f $f && echo '✅' || echo '❌')"
          done

      - name: 🔨 Build macOS ARM Executable
        run: |
          pyinstaller \
            --onefile \
            --name ${{ env.APP_NAME }}-macOS-ARM \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "config.yml:." \
            --add-data "install_ollama.py:." \
            --hidden-import flask \
            --hidden-import requests \
            --hidden-import yaml \
            --hidden-import jinja2 \
            --hidden-import markupsafe \
            --hidden-import click \
            --hidden-import blinker \
            --hidden-import itsdangerous \
            --hidden-import werkzeug \
            --clean \
            --noconfirm \
            app.py

      - name: 📁 Create Release Package
        run: |
          VERSION=${{ needs.check-updates.outputs.latest_version }}
          mkdir -p release/OrionGUI-macOS-ARM
          cp dist/${{ env.APP_NAME }}-macOS-ARM release/OrionGUI-macOS-ARM/
          cp install_ollama.py release/OrionGUI-macOS-ARM/
          cp config.yml release/OrionGUI-macOS-ARM/
          cp README.md release/OrionGUI-macOS-ARM/ || true
          chmod +x release/OrionGUI-macOS-ARM/${{ env.APP_NAME }}-macOS-ARM
          cd release
          tar -czf ../OrionGUI-macOS-ARM-${VERSION}.tar.gz OrionGUI-macOS-ARM/

      - name: 📤 Upload macOS ARM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-macOS-ARM
          path: OrionGUI-macOS-ARM-*.tar.gz
          retention-days: 30

  # ==========================================
  # BUILD MACOS (Intel)
  # ==========================================
  build-macos-intel:
    name: 🍎 Build macOS (Intel)
    needs: [check-updates, generate-config]
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Generated Files
        uses: actions/download-artifact@v4
        with:
          name: generated-files
          path: .

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 📋 Verify Files
        run: |
          for f in app.py config.yml install_ollama.py; do
            echo "$f: $(test -f $f && echo '✅' || echo '❌')"
          done

      - name: 🔨 Build macOS Intel Executable
        run: |
          pyinstaller \
            --onefile \
            --name ${{ env.APP_NAME }}-macOS-Intel \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "config.yml:." \
            --add-data "install_ollama.py:." \
            --hidden-import flask \
            --hidden-import requests \
            --hidden-import yaml \
            --hidden-import jinja2 \
            --hidden-import markupsafe \
            --hidden-import click \
            --hidden-import blinker \
            --hidden-import itsdangerous \
            --hidden-import werkzeug \
            --clean \
            --noconfirm \
            app.py

      - name: 📁 Create Release Package
        run: |
          VERSION=${{ needs.check-updates.outputs.latest_version }}
          mkdir -p release/OrionGUI-macOS-Intel
          cp dist/${{ env.APP_NAME }}-macOS-Intel release/OrionGUI-macOS-Intel/
          cp install_ollama.py release/OrionGUI-macOS-Intel/
          cp config.yml release/OrionGUI-macOS-Intel/
          cp README.md release/OrionGUI-macOS-Intel/ || true
          chmod +x release/OrionGUI-macOS-Intel/${{ env.APP_NAME }}-macOS-Intel
          cd release
          tar -czf ../OrionGUI-macOS-Intel-${VERSION}.tar.gz OrionGUI-macOS-Intel/

      - name: 📤 Upload macOS Intel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-macOS-Intel
          path: OrionGUI-macOS-Intel-*.tar.gz
          retention-days: 30

  # ==========================================
  # CREATE GITHUB RELEASE
  # ==========================================
  release:
    name: 🚀 Create Release
    needs: [check-updates, build-linux, build-windows, build-macos-arm, build-macos-intel]
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 📁 Prepare Release Files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.exe" \) -exec cp {} release-files/ \;
          echo "📦 Release files:"
          ls -la release-files/

      - name: 🔖 Get Version
        id: version
        run: |
          VERSION=${{ needs.check-updates.outputs.latest_version }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: 📝 Generate Release Notes
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cat > changelog.md << EOF
          ## 🚀 Orion GUI ${VERSION}

          > Built with latest Ollama model configuration

          ### ✨ Features
          - 💬 Chat GUI with streaming responses
          - 📦 Model Manager (check/update/delete)
          - 🏪 Model Store (download any model)
          - ⚙️ Ollama auto-installer
          - 🔄 Auto update checking
          - 📊 Download progress tracking
          - 📱 Mobile responsive

          ### 📥 Downloads

          #### 🐧 Linux
          | Type | File | Description |
          |------|------|-------------|
          | 📦 AppImage | \`OrionGUI-Linux-${VERSION}.AppImage\` | Double-click to run, no install needed |
          | 📁 Portable | \`OrionGUI-Linux-${VERSION}.tar.gz\` | Extract and run |

          #### 🪟 Windows
          | Type | File | Description |
          |------|------|-------------|
          | 🔧 Setup Installer | \`OrionGUI-Windows-Setup-${VERSION}.exe\` | Full installer with shortcuts |
          | 📁 Portable | \`OrionGUI-Windows-Portable-${VERSION}.zip\` | No install needed |

          #### 🍎 macOS
          | Type | File | Description |
          |------|------|-------------|
          | 🍎 Apple Silicon | \`OrionGUI-macOS-ARM-${VERSION}.tar.gz\` | M1/M2/M3/M4 |
          | 🍎 Intel | \`OrionGUI-macOS-Intel-${VERSION}.tar.gz\` | Intel Macs |

          ### 🚀 Quick Start

          **Linux (AppImage):**
          \`\`\`bash
          chmod +x OrionGUI-Linux-${VERSION}.AppImage
          ./OrionGUI-Linux-${VERSION}.AppImage
          \`\`\`

          **Linux (Portable):**
          \`\`\`bash
          tar -xzf OrionGUI-Linux-${VERSION}.tar.gz
          cd OrionGUI-Linux/
          ./OrionGUI-Linux
          \`\`\`

          **Windows (Setup):**
          \`\`\`
          1. Run OrionGUI-Windows-Setup-${VERSION}.exe
          2. Follow the installer
          3. Launch from Start Menu or Desktop
          \`\`\`

          **Windows (Portable):**
          \`\`\`
          1. Extract ZIP
          2. Run OrionGUI-Windows.exe
          3. Open http://localhost:5000
          \`\`\`

          **macOS:**
          \`\`\`bash
          tar -xzf OrionGUI-macOS-*.tar.gz
          cd OrionGUI-macOS-*/
          chmod +x OrionGUI-macOS-*
          ./OrionGUI-macOS-*
          \`\`\`

          ### 🔧 Install Ollama

          **Linux:**
          \`\`\`bash
          curl -fsSL https://ollama.com/install.sh | sh
          \`\`\`

          **macOS:**
          \`\`\`bash
          brew install ollama
          \`\`\`

          **Windows:**
          Download from https://ollama.com/download
          Or check "Install Ollama" during setup.

          ### ◉ Pull Orion
          \`\`\`bash
          ollama pull OmniNode/Orion:V1.1
          \`\`\`

          ---
          Made with ❤️ by **OmniNode**
          EOF

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Orion GUI ${{ steps.version.outputs.version }}"
          body_path: changelog.md
          draft: false
          prerelease: ${{ github.event.inputs.pre_release == 'true' }}
          files: |
            release-files/*
          fail_on_unmatched_files: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # VERIFY
  # ==========================================
  verify:
    name: ✅ Verify Release
    needs: [check-updates, release]
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Print Results
        run: |
          VERSION=${{ needs.check-updates.outputs.latest_version }}
          REPO=${{ github.repository }}
          echo ""
          echo "✅ Release ${VERSION} created!"
          echo ""
          echo "📌 Downloads:"
          echo "  🐧 AppImage:      https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-Linux-${VERSION}.AppImage"
          echo "  🐧 Portable:      https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-Linux-${VERSION}.tar.gz"
          echo "  🪟 Setup:         https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-Windows-Setup-${VERSION}.exe"
          echo "  🪟 Portable:      https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-Windows-Portable-${VERSION}.zip"
          echo "  🍎 macOS ARM:     https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-macOS-ARM-${VERSION}.tar.gz"
          echo "  🍎 macOS Intel:   https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-macOS-Intel-${VERSION}.tar.gz"

      - name: 📊 Summary
        run: |
          VERSION=${{ needs.check-updates.outputs.latest_version }}
          REPO=${{ github.repository }}
          cat >> $GITHUB_STEP_SUMMARY << EOF

          ## ✅ Release Complete - ${VERSION}

          ### 📥 Downloads

          | Platform | Type | Link |
          |----------|------|------|
          | 🐧 Linux | AppImage | [Download](https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-Linux-${VERSION}.AppImage) |
          | 🐧 Linux | Portable | [Download](https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-Linux-${VERSION}.tar.gz) |
          | 🪟 Windows | Setup Installer | [Download](https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-Windows-Setup-${VERSION}.exe) |
          | 🪟 Windows | Portable ZIP | [Download](https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-Windows-Portable-${VERSION}.zip) |
          | 🍎 macOS | Apple Silicon | [Download](https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-macOS-ARM-${VERSION}.tar.gz) |
          | 🍎 macOS | Intel | [Download](https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-macOS-Intel-${VERSION}.tar.gz) |

          EOF