      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Orion GUI ${{ steps.version.outputs.version }}"
          body_path: changelog.md
          draft: false
          prerelease: ${{ github.event.inputs.pre_release == 'true' }}
          files: |
            release-files/*
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # VERIFY RELEASE
  # ==========================================
  verify:
    name: ✅ Verify Release
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Print Download Links
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          REPO=${{ github.repository }}
          echo ""
          echo "✅ Release created successfully!"
          echo ""
          echo "📌 Download links:"
          echo "  🐧 Linux:          https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-Linux-${VERSION}.tar.gz"
          echo "  🪟 Windows:        https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-Windows-${VERSION}.zip"
          echo "  🍎 macOS ARM:      https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-macOS-ARM-${VERSION}.tar.gz"
          echo "  🍎 macOS Intel:    https://github.com/${REPO}/releases/download/${VERSION}/OrionGUI-macOS-Intel-${VERSION}.tar.gz"
          echo ""
          echo "🌐 Release page: https://github.com/${REPO}/releases/tag/${VERSION}"