name: Build Orion GUI

on:
  # Trigger on version tags
  push:
    tags:
      - 'v*'

  # Manual trigger with version input
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.1.0)'
        required: true
        default: '1.1.0'
      pre_release:
        description: 'Pre-release?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: 'OrionGUI'

jobs:
  # ==========================================
  # BUILD FOR LINUX
  # ==========================================
  build-linux:
    name: 🐧 Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🔨 Build Linux Executable
        run: |
          pyinstaller \
            --onefile \
            --name ${{ env.APP_NAME }}-Linux \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "config.yml:." \
            --add-data "install_ollama.py:." \
            --hidden-import flask \
            --hidden-import requests \
            --hidden-import yaml \
            --hidden-import jinja2 \
            --hidden-import markupsafe \
            --hidden-import click \
            --hidden-import blinker \
            --hidden-import itsdangerous \
            --hidden-import werkzeug \
            --clean \
            --noconfirm \
            app.py

      - name: 📁 Create Release Package
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          mkdir -p release/OrionGUI-Linux
          cp dist/${{ env.APP_NAME }}-Linux release/OrionGUI-Linux/
          cp install_ollama.py release/OrionGUI-Linux/
          cp config.yml release/OrionGUI-Linux/
          cp README.md release/OrionGUI-Linux/
          chmod +x release/OrionGUI-Linux/${{ env.APP_NAME }}-Linux
          cd release
          tar -czf ../OrionGUI-Linux-${VERSION}.tar.gz OrionGUI-Linux/

      - name: ✅ Test Executable
        run: |
          chmod +x dist/${{ env.APP_NAME }}-Linux
          timeout 5 dist/${{ env.APP_NAME }}-Linux --help || true
          echo "✅ Linux build test passed"

      - name: 📤 Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-Linux
          path: OrionGUI-Linux-*.tar.gz
          retention-days: 30

  # ==========================================
  # BUILD FOR WINDOWS
  # ==========================================
  build-windows:
    name: 🪟 Build Windows
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🔨 Build Windows Executable
        run: |
          pyinstaller `
            --onefile `
            --name ${{ env.APP_NAME }}-Windows `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "config.yml;." `
            --add-data "install_ollama.py;." `
            --hidden-import flask `
            --hidden-import requests `
            --hidden-import yaml `
            --hidden-import jinja2 `
            --hidden-import markupsafe `
            --hidden-import click `
            --hidden-import blinker `
            --hidden-import itsdangerous `
            --hidden-import werkzeug `
            --clean `
            --noconfirm `
            --console `
            app.py

      - name: 📁 Create Release Package
        shell: pwsh
        run: |
          $VERSION = "${{ github.event.inputs.version || github.ref_name }}"
          New-Item -ItemType Directory -Force -Path release\OrionGUI-Windows
          Copy-Item "dist\${{ env.APP_NAME }}-Windows.exe" "release\OrionGUI-Windows\"
          Copy-Item "install_ollama.py" "release\OrionGUI-Windows\"
          Copy-Item "config.yml" "release\OrionGUI-Windows\"
          Copy-Item "README.md" "release\OrionGUI-Windows\"
          Compress-Archive -Path "release\OrionGUI-Windows\*" -DestinationPath "OrionGUI-Windows-${VERSION}.zip"

      - name: ✅ Test Executable
        run: |
          Start-Process -FilePath "dist\${{ env.APP_NAME }}-Windows.exe" -ArgumentList "--help" -NoNewWindow -Wait -ErrorAction SilentlyContinue
          echo "✅ Windows build test passed"
        shell: pwsh

      - name: 📤 Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-Windows
          path: OrionGUI-Windows-*.zip
          retention-days: 30

  # ==========================================
  # BUILD FOR MACOS (Intel)
  # ==========================================
  build-macos-intel:
    name: 🍎 Build macOS (Intel)
    runs-on: macos-13

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🔨 Build macOS Intel Executable
        run: |
          pyinstaller \
            --onefile \
            --name ${{ env.APP_NAME }}-macOS-Intel \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "config.yml:." \
            --add-data "install_ollama.py:." \
            --hidden-import flask \
            --hidden-import requests \
            --hidden-import yaml \
            --hidden-import jinja2 \
            --hidden-import markupsafe \
            --hidden-import click \
            --hidden-import blinker \
            --hidden-import itsdangerous \
            --hidden-import werkzeug \
            --clean \
            --noconfirm \
            app.py

      - name: 📁 Create Release Package
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          mkdir -p release/OrionGUI-macOS-Intel
          cp dist/${{ env.APP_NAME }}-macOS-Intel release/OrionGUI-macOS-Intel/
          cp install_ollama.py release/OrionGUI-macOS-Intel/
          cp config.yml release/OrionGUI-macOS-Intel/
          cp README.md release/OrionGUI-macOS-Intel/
          chmod +x release/OrionGUI-macOS-Intel/${{ env.APP_NAME }}-macOS-Intel
          cd release
          tar -czf ../OrionGUI-macOS-Intel-${VERSION}.tar.gz OrionGUI-macOS-Intel/

      - name: ✅ Test Executable
        run: |
          chmod +x dist/${{ env.APP_NAME }}-macOS-Intel
          timeout 5 dist/${{ env.APP_NAME }}-macOS-Intel --help || true
          echo "✅ macOS Intel build test passed"

      - name: 📤 Upload macOS Intel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-macOS-Intel
          path: OrionGUI-macOS-Intel-*.tar.gz
          retention-days: 30

  # ==========================================
  # BUILD FOR MACOS (Apple Silicon)
  # ==========================================
  build-macos-arm:
    name: 🍎 Build macOS (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🔨 Build macOS ARM Executable
        run: |
          pyinstaller \
            --onefile \
            --name ${{ env.APP_NAME }}-macOS-ARM \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "config.yml:." \
            --add-data "install_ollama.py:." \
            --hidden-import flask \
            --hidden-import requests \
            --hidden-import yaml \
            --hidden-import jinja2 \
            --hidden-import markupsafe \
            --hidden-import click \
            --hidden-import blinker \
            --hidden-import itsdangerous \
            --hidden-import werkzeug \
            --clean \
            --noconfirm \
            app.py

      - name: 📁 Create Release Package
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          mkdir -p release/OrionGUI-macOS-ARM
          cp dist/${{ env.APP_NAME }}-macOS-ARM release/OrionGUI-macOS-ARM/
          cp install_ollama.py release/OrionGUI-macOS-ARM/
          cp config.yml release/OrionGUI-macOS-ARM/
          cp README.md release/OrionGUI-macOS-ARM/
          chmod +x release/OrionGUI-macOS-ARM/${{ env.APP_NAME }}-macOS-ARM
          cd release
          tar -czf ../OrionGUI-macOS-ARM-${VERSION}.tar.gz OrionGUI-macOS-ARM/

      - name: ✅ Test Executable
        run: |
          chmod +x dist/${{ env.APP_NAME }}-macOS-ARM
          timeout 5 dist/${{ env.APP_NAME }}-macOS-ARM --help || true
          echo "✅ macOS ARM build test passed"

      - name: 📤 Upload macOS ARM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrionGUI-macOS-ARM
          path: OrionGUI-macOS-ARM-*.tar.gz
          retention-days: 30

  # ==========================================
  # CREATE GITHUB RELEASE
  # ==========================================
  release:
    name: 🚀 Create Release
    needs: [build-linux, build-windows, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 📋 List All Artifacts
        run: |
          echo "📦 Downloaded artifacts:"
          find artifacts -type f -ls

      - name: 📁 Prepare Release Files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-files/ \;
          echo "📦 Release files:"
          ls -la release-files/

      - name: 🔖 Get Version
        id: version
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📌 Version: ${VERSION}"

      - name: 📝 Generate Changelog
        id: changelog
        run: |
          cat << 'EOF' > changelog.md
          ## 🚀 Orion GUI ${{ steps.version.outputs.version }}

          ### ✨ What's New
          - Full GUI for Orion AI on Ollama
          - Model Manager with update checking
          - Model Store with version downloads
          - Ollama auto-installer
          - Real-time streaming chat
          - Cross-platform support

          ### 📥 Downloads

          | Platform | Architecture | File |
          |----------|-------------|------|
          | 🐧 Linux | x86_64 | `OrionGUI-Linux-${{ steps.version.outputs.version }}.tar.gz` |
          | 🪟 Windows | x86_64 | `OrionGUI-Windows-${{ steps.version.outputs.version }}.zip` |
          | 🍎 macOS | Intel (x86_64) | `OrionGUI-macOS-Intel-${{ steps.version.outputs.version }}.tar.gz` |
          | 🍎 macOS | Apple Silicon (ARM) | `OrionGUI-macOS-ARM-${{ steps.version.outputs.version }}.tar.gz` |

          ### 📋 Requirements
          - Ollama installed and running
          - If Ollama is not installed, use the built-in installer

          ### 🚀 Quick Start

          **Linux / macOS:**
          ```bash
          tar -xzf OrionGUI-*.tar.gz
          cd OrionGUI-*/
          chmod +x OrionGUI-*
          ./OrionGUI-*
          ```

          **Windows:**
          ```
          1. Extract the ZIP file
          2. Double-click OrionGUI-Windows.exe
          3. Open browser → http://localhost:5000
          ```

          ### 🔧 Install Ollama (if needed)

          **Linux:**
          ```bash
          curl -fsSL https://ollama.com/install.sh | sh
          ```

          **macOS:**
          ```bash
          brew install ollama
          ```

          **Windows:**
          ```
          Download from https://ollama.com/download
          ```

          ### ◉ Pull Orion Model
          ```bash
          ollama pull OmniNode/Orion:V1.1
          ```

          ---
          Made with ❤️ by **OmniNode**
          EOF

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Orion GUI ${{ steps.version.outputs.version }}"
          body_path: changelog.md
          draft: false
          prerelease: ${{ github.event.inputs.pre_release == 'true' }}
          files: |
            release-files/*
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # POST-RELEASE VERIFICATION
  # ==========================================
  verify:
    name: ✅ Verify Release
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Verify Release Exists
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          echo "✅ Release created: ${VERSION}"
          echo ""
          echo "📌 Download links:"
          echo "  🐧 Linux:        https://github.com/${{ github.repository }}/releases/download/${VERSION}/OrionGUI-Linux-${VERSION}.tar.gz"
          echo "  🪟 Windows:      https://github.com/${{ github.repository }}/releases/download/${VERSION}/OrionGUI-Windows-${VERSION}.zip"
          echo "  🍎 macOS Intel:  https://github.com/${{ github.repository }}/releases/download/${VERSION}/OrionGUI-macOS-Intel-${VERSION}.tar.gz"
          echo "  🍎 macOS ARM:    https://github.com/${{ github.repository }}/releases/download/${VERSION}/OrionGUI-macOS-ARM-${VERSION}.tar.gz"